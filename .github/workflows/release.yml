name: Production Release (crates.io & npm)

on:
  push:
    tags:
      - "v*" # Triggers automatically whenever you push a tag like v1.0.0, v1.1.2, etc.

jobs:
  test:
    name: Run Test Suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Cargo Tests
        run: cargo test --verbose

  publish-rust:
    name: Publish Crate to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}

  publish-npm:
    name: Build WASM & Publish to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Package
        # Note: If targeting frontend runtimes, change --target nodejs to --target bundler
        run: wasm-pack build --target nodejs --release

      - name: Publish Package to npm
        run: |
          cd pkg
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
